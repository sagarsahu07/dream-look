<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Lookup — Dream Look Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💈</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/booking-success.css">
  <link rel="stylesheet" href="assets/css/admin-dashboard.css">
</head>
<body data-page="admin-scan">

  <div class="page-loader" id="dl-page-loader">
    <div class="page-loader__mark">DREAM <span>LOOK</span></div>
  </div>

  <div id="dl-navbar"></div>

  <main>
    <section class="section" style="padding-top: var(--space-5);">
      <div class="container" style="max-width:560px;">
        <div class="eyebrow">Admin</div>
        <h1 class="section-title">Booking Lookup</h1>
        <p class="section-subtitle">Opened automatically when a customer's receipt QR code is scanned. You can also look a booking up manually below.</p>

        <div class="card" style="margin-bottom: var(--space-5);">
          <div style="display:flex; gap: var(--space-2); align-items:flex-end; flex-wrap:wrap;">
            <div class="field" style="margin-bottom:0; flex:1; min-width:200px;">
              <label for="manual-booking-id">Booking ID</label>
              <input type="text" id="manual-booking-id" placeholder="Paste or type a booking ID">
            </div>
            <button type="button" class="btn btn--dark btn--sm" id="lookup-btn">Look Up</button>
          </div>
        </div>

        <div class="form-alert form-alert--error" id="scan-alert"></div>

        <div id="loading-note" class="admin-loading-note" style="display:none;">Looking up booking…</div>

        <div class="receipt-card" id="result-card" style="display:none;">
          <div class="receipt-card__header">
            <div class="receipt-card__brand"><span class="receipt-card__brand-mark">DL</span> Dream Look</div>
            <span class="status-badge" id="s-status-badge"></span>
          </div>
          <div class="receipt-row"><span class="receipt-row__label">Booking ID</span><span class="receipt-row__value" id="s-booking-id"></span></div>
          <div class="receipt-row"><span class="receipt-row__label">Customer</span><span class="receipt-row__value" id="s-customer"></span></div>
          <div class="receipt-row"><span class="receipt-row__label">Service</span><span class="receipt-row__value" id="s-service"></span></div>
          <div class="receipt-row"><span class="receipt-row__label">Barber</span><span class="receipt-row__value" id="s-barber"></span></div>
          <div class="receipt-row"><span class="receipt-row__label">Date</span><span class="receipt-row__value" id="s-date"></span></div>
          <div class="receipt-row"><span class="receipt-row__label">Time</span><span class="receipt-row__value" id="s-time"></span></div>
          <div class="receipt-row"><span class="receipt-row__label">Queue Number</span><span class="receipt-row__value" id="s-queue"></span></div>
          <div class="receipt-row"><span class="receipt-row__label">Payment</span><span class="receipt-row__value" id="s-payment"></span></div>
        </div>

        <div class="data-table__actions no-print" id="scan-actions" style="margin-top: var(--space-4); display:none;"></div>
      </div>
    </section>
  </main>

  <div id="dl-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabaseClient.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/booking.js"></script>
  <script src="assets/js/receipt.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/admin-scan.js"></script>
</body>
</html>
