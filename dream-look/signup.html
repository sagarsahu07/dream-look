<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Dream Look</title>
  <meta name="description" content="Create your Dream Look account to start booking appointments.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💈</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body data-page="signup">

  <div class="page-loader" id="dl-page-loader">
    <div class="page-loader__mark">DREAM <span>LOOK</span></div>
  </div>

  <div id="dl-navbar"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-card__mark">DL</div>
      <h1>Create your account</h1>
      <p class="auth-card__subtitle">Book your first appointment in under a minute.</p>

      <div class="form-alert form-alert--error" id="signup-alert"></div>

      <button type="button" class="btn btn--primary btn--block" id="google-signup-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right:8px;"><path fill="#000" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62Z"/><path fill="#000" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.83.86-3.06.86-2.36 0-4.36-1.6-5.07-3.74H.9v2.33A9 9 0 0 0 9 18Z"/><path fill="#000" d="M3.93 10.68A5.4 5.4 0 0 1 3.65 9c0-.58.1-1.15.28-1.68V4.99H.9A9 9 0 0 0 0 9c0 1.45.35 2.83.9 4.01l3.03-2.33Z"/><path fill="#000" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .9 4.99l3.03 2.33C4.64 5.18 6.64 3.58 9 3.58Z"/></svg>
          Continue with Google
      </button>
      <div class="auth-card__divider">or use your email</div>

      <form id="signup-form" novalidate>
        <div class="field">
          <label for="signup-name">Full name</label>
          <input type="text" id="signup-name" name="fullName" placeholder="Your name" autocomplete="name">
          <span class="field-error" data-for="signup-name"></span>
        </div>
        <div class="field">
          <label for="signup-email">Email address</label>
          <input type="email" id="signup-email" name="email" placeholder="you@example.com" autocomplete="email">
          <span class="field-error" data-for="signup-email"></span>
        </div>
        <div class="field">
          <label for="signup-phone">Phone number <span style="color:var(--color-gray);font-weight:400;">(optional)</span></label>
          <input type="tel" id="signup-phone" name="phone" placeholder="+91 90000 00000" autocomplete="tel">
          <span class="field-error" data-for="signup-phone"></span>
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" placeholder="At least 8 characters" autocomplete="new-password">
          <span class="field-error" data-for="signup-password"></span>
        </div>
        <div class="field">
          <label for="signup-confirm-password">Confirm password</label>
          <input type="password" id="signup-confirm-password" name="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
          <span class="field-error" data-for="signup-confirm-password"></span>
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="signup-submit">Create Account</button>
      </form>

      <p class="auth-card__footnote">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>

  <div id="dl-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabaseClient.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/signup.js"></script>
</body>
</html>
