<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Dream Look</title>
  <meta name="description" content="Reset your Dream Look account password.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💈</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body data-page="forgot-password">

  <div class="page-loader" id="dl-page-loader">
    <div class="page-loader__mark">DREAM <span>LOOK</span></div>
  </div>

  <div id="dl-navbar"></div>

  <main class="auth-page">
    <!-- Step 1: request a reset link -->
    <div class="auth-card" id="request-step">
      <div class="auth-card__mark">DL</div>
      <h1>Reset your password</h1>
      <p class="auth-card__subtitle">Enter your email and we will send you a reset link.</p>

      <div class="form-alert" id="forgot-alert"></div>

      <form id="forgot-form" novalidate>
        <div class="field">
          <label for="forgot-email">Email address</label>
          <input type="email" id="forgot-email" name="email" placeholder="you@example.com" autocomplete="email">
          <span class="field-error" data-for="forgot-email"></span>
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="forgot-submit">Send Reset Link</button>
      </form>

      <p class="auth-card__footnote">Remembered it? <a href="login.html">Back to login</a></p>
    </div>

    <!-- Step 2: set a new password (shown after clicking the emailed link) -->
    <div class="auth-card" id="recovery-step" style="display:none;">
      <div class="auth-card__mark">DL</div>
      <h1>Set a new password</h1>
      <p class="auth-card__subtitle">Choose a new password for your account.</p>

      <div class="form-alert" id="recovery-alert"></div>

      <form id="recovery-form" novalidate>
        <div class="field">
          <label for="recovery-password">New password</label>
          <input type="password" id="recovery-password" name="password" placeholder="At least 8 characters" autocomplete="new-password">
          <span class="field-error" data-for="recovery-password"></span>
        </div>
        <div class="field">
          <label for="recovery-confirm-password">Confirm new password</label>
          <input type="password" id="recovery-confirm-password" name="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
          <span class="field-error" data-for="recovery-confirm-password"></span>
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="recovery-submit">Update Password</button>
      </form>
    </div>
  </main>

  <div id="dl-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabaseClient.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/forgot-password.js"></script>
</body>
</html>
